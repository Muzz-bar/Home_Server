version: '3.8'

services:
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita_app
    user: "1001:1001" 
    ports:
      - "5000:5000"
    volumes:
      - ../../../app-storages/kavita/config:/kavita/config
      # Tempat lu naruh file PDF/ePub nyata di server lu:
      - /home/muzz/my_serverku/app-storages/syncthing/backup_hp:/manga
    restart: always
