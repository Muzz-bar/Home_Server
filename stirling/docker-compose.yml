services:
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling_pdf_app
    ports:
      - "8089:8080"
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - INSTALL_BOOK_AND_ADVANCED_HTML_OPS=true
      - LANGS=en_GB,id_ID # Menambahkan dukungan OCR Bahasa Inggris dan Bahasa Indonesia
    volumes:
      - ./trainingData:/usr/share/tessdata # Tempat menyimpan data kecerdasan bahasa untuk OCR
      - ./extraConfigs:/configs
      - ./logs:/logs
    restart: unless-stopped