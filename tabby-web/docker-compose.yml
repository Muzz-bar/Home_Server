services:
  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud_db
    # ... (setelan database lu yang sudah ada) ...

  nextcloud-redis:
    image: redis:alpine
    container_name: nextcloud_redis
    restart: always

  nextcloud-app:
    image: nextcloud:latest
    container_name: nextcloud_app
    # --- SUNTIKKAN REDIS KE ENVIRONMENT NEXTCLOUD ---
    environment:
      - REDIS_HOST=nextcloud-redis
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    # ... (setelan ports dan volumes lu yang sudah ada) ...