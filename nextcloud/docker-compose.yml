services:
  nextcloud-db:
    image: postgres:15-alpine
    container_name: nextcloud_db_container
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nextcloud_db
      - POSTGRES_USER=nextcloud_user
      - POSTGRES_PASSWORD=${DB_PASSWORD} # Membaca dari file .env
    networks:
      - nextcloud_network

  nextcloud-app:
    image: nextcloud:alpine
    container_name: nextcloud_app_container
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./nextcloud_data:/var/www/html
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=nextcloud_db
      - POSTGRES_USER=nextcloud_user
      - POSTGRES_PASSWORD=${DB_PASSWORD} # Membaca dari file .env
    networks:
      - nextcloud_network
    depends_on:
      - nextcloud-db

networks:
  nextcloud_network:
    driver: bridge


